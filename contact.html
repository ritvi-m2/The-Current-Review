<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contact — The Current Review</title>
    <link rel="icon" href="TCR.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div class="site-wrap">
        <div class="brand">
          <a class="logo" href="index.html"><img class="logo-icon" src="TCR.png" alt="The Current Review logo">The Current Review</a>
          <nav>
            <ul class="nav">
              <li><a href="index.html">Home</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main class="site-wrap">
      <h1>Contact</h1>
      <section class="featured">
        <p>Want to ask a question or share an idea? Type it below.</p>
        <form class="question-form">
          <textarea id="question-box" class="question-box" placeholder="Type your question here..." rows="10"></textarea>
          <p class="question-actions"><button id="send-question" class="cta-button" type="button">Send</button></p>
          <p id="word-count" class="word-count">0 / 200 words</p>
        </form>
      </section>
    </main>
    <script>
      (function () {
        const questionBox = document.getElementById('question-box');
        const wordCount = document.getElementById('word-count');
        const sendButton = document.getElementById('send-question');
        if (!questionBox || !wordCount) return;

        function updateWordLimit() {
          const words = questionBox.value.trim().match(/\S+/g) || [];

          if (words.length > 200) {
            questionBox.value = words.slice(0, 200).join(' ');
          }

          const currentWords = questionBox.value.trim().match(/\S+/g) || [];
          wordCount.textContent = `${currentWords.length} / 200 words`;
        }

        questionBox.addEventListener('input', updateWordLimit);

        if (sendButton) {
          sendButton.addEventListener('click', function () {
            questionBox.value = '';
            wordCount.textContent = '0 / 200 words';
          });
        }
      })();
    </script>
  </body>
</html>
